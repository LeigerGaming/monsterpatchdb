<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MonsterpatchDB</title>
        <script>
            (function () {
                var theme = localStorage.getItem("theme");
                if (theme === "light" || theme === "dark") {
                    document.documentElement.setAttribute("data-theme", theme);
                }
            })();
        </script>
        <!-- Icons -->
        <link rel="icon" href="./favicon/favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png">
        <link rel="manifest" href="./favicon/site.webmanifest">
        <!-- CSS -->
        <link rel="stylesheet" href="./fonts/fontawesome-free-7.3.0-web/css/all.min.css">
        <link rel="stylesheet" href="./assets/app.css">
        <link rel="stylesheet" href="./assets/featured-video.css">
        <link rel="stylesheet" href="./assets/theme-switcher.css">
        <!-- SEO (https://metatags.io) -->
        <!-- Primary Meta Tags -->
        <title>Monsterpatch Database</title>
        <meta name="title" content="Monsterpatch Database" />
        <meta name="description" content="MonsterpatchDB is the ultimate Monsterpatch resource. Everything useful in one place: game updates, social links, community tools, and videos." />
        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://monsterpatchdb.com/" />
        <meta property="og:title" content="Monsterpatch Database" />
        <meta property="og:description" content="MonsterpatchDB is the ultimate Monsterpatch resource. Everything useful in one place: game updates, social links, community tools, and videos." />
        <meta property="og:image" content="/assets/monsterpatch_db.jpg" />
        <!-- X (Twitter) -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:url" content="https://monsterpatchdb.com/" />
        <meta property="twitter:title" content="Monsterpatch Database" />
        <meta property="twitter:description" content="MonsterpatchDB is the ultimate Monsterpatch resource. Everything useful in one place: game updates, social links, community tools, and videos." />
        <meta property="twitter:image" content="/assets/monsterpatch_db.jpg" />
    </head>
    <body>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme">
            <i class="fa-solid fa-sun" aria-hidden="true"></i>
        </button>

        <main class="page-shell">
            <section class="hero">
                <div class="eyebrow">Community Link Hub</div>
                <h1>Monsterpatch Database</h1>
                <p>Everything useful in one place: game updates, social links, community tools, and videos. Send feedback on <a href="https://github.com/LeigerGaming/monsterpatchdb" target="_blank">GitHub</a> or <a href="https://discord.com/channels/1283131155645857844/1524436413620158464" target="_blank">Discord</a>.</p>
            </section>

            <section id="load-status" class="status">
                <strong>Loading links...</strong>
            </section>
            <section id="card-grid" class="card-grid" hidden></section>
        </main>

        <aside id="featured-video-slot" class="featured-video-slot" hidden></aside>

        <div id="video-modal" class="video-modal" hidden>
            <button type="button" class="video-modal-backdrop" aria-label="Close video"></button>
            <div class="video-modal-panel">
                <button type="button" id="video-modal-close" class="video-modal-close" aria-label="Close video">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
                <div class="video-modal-frame">
                    <iframe id="video-modal-iframe" title="Video player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <script src="./assets/theme-switcher.js"></script>
        <script src="./assets/featured-video.js"></script>
        <script src="./assets/app.js"></script>
    </body>
</html>
