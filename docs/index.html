<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MonsterpatchDB</title>
        <link rel="stylesheet" href="./fonts/fontawesome-free-7.3.0-web/css/all.min.css">
        <link rel="stylesheet" href="./assets/featured-video.css">
        <style>
            @font-face {
                font-family: "Roses FF0000 Local";
                src: url("./fonts/RosesareFF0000.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }

            :root {
                color-scheme: light;
                --page-bg: #f7f4ef;
                --surface: #ffffff;
                --surface-muted: #fbf8f2;
                --border: #d8d1c7;
                --text: #221f1a;
                --muted: #635c53;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                padding: 40px 20px 56px;
                font-family: "Trebuchet MS", "Avenir Next", sans-serif;
                color: var(--text);
                background: var(--page-bg);
            }

            .page-shell {
                position: relative;
                max-width: 1180px;
                margin: 0 auto;
                width: 100%;
            }

            .hero {
                margin-bottom: 28px;
                padding: 32px;
                border: 1px solid var(--border);
                border-radius: 18px;
                background: var(--surface);
            }

            .eyebrow {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 14px;
                padding: 6px 10px;
                border: 1px solid var(--border);
                border-radius: 999px;
                background: var(--surface-muted);
                color: var(--muted);
                font-size: 0.8rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            h1 {
                margin: 0 0 12px;
                font-family: "Roses FF0000 Local", cursive;
                font-size: clamp(2.2rem, 5.4vw, 4.1rem);
                line-height: 1;
                letter-spacing: 0.01em;
            }

            .hero p {
                max-width: 700px;
                margin: 0;
                color: var(--muted);
                font-size: 1.05rem;
                line-height: 1.65;
                overflow-wrap: anywhere;
            }

            .card-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
            }

            .card-grid[hidden] {
                display: none;
            }

            .card {
                flex: 1 1 320px;
                min-width: 0;
                padding: 24px;
                border: 1px solid var(--border);
                border-radius: 18px;
                background: var(--surface);
            }

            .card h2 {
                margin: 0 0 6px;
                font-family: "Roses FF0000 Local", cursive;
                font-size: 1.25rem;
                line-height: 1.2;
                letter-spacing: 0.01em;
            }

            .card p {
                margin: 0 0 18px;
                color: var(--muted);
                line-height: 1.55;
            }

            .link-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            @media (min-width: 760px) {
                .games-card .link-list {
                    display: grid;
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                    gap: 12px;
                }
            }

            .link-item,
            .link-item:visited {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 16px;
                border-radius: 14px;
                border: 1px solid var(--border);
                background: var(--surface-muted);
                color: var(--text);
                text-decoration: none;
                transition: border-color 160ms ease, background-color 160ms ease;
            }

            .link-item:hover,
            .link-item:focus-visible {
                border-color: #bdb5aa;
                background: #ffffff;
                outline: none;
            }

            .icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                flex: 0 0 42px;
                width: 42px;
                height: 42px;
                border: 1px solid var(--border);
                border-radius: 12px;
                background: #ffffff;
                color: var(--text);
            }

            .icon i {
                font-size: 20px;
                line-height: 1;
            }

            .link-copy {
                min-width: 0;
                flex: 1 1 auto;
            }

            .link-title {
                display: block;
                font-weight: 700;
            }

            .link-meta {
                display: block;
                margin-top: 3px;
                color: var(--muted);
                font-size: 0.92rem;
            }

            .status {
                padding: 20px 22px;
                border: 1px solid var(--border);
                border-radius: 18px;
                background: var(--surface);
                color: var(--muted);
            }

            .status[hidden] {
                display: none;
            }

            .status strong {
                color: var(--text);
            }

            @media (max-width: 700px) {
                body {
                    padding: 18px 12px 32px;
                }

                .hero,
                .card {
                    padding: 18px;
                    border-radius: 16px;
                }

                .hero {
                    margin-bottom: 18px;
                }

                .eyebrow {
                    max-width: 100%;
                    white-space: normal;
                }

                .link-item,
                .link-item:visited {
                    gap: 12px;
                    padding: 12px;
                    border-radius: 12px;
                    align-items: flex-start;
                }

                .icon {
                    flex: 0 0 38px;
                    width: 38px;
                    height: 38px;
                    border-radius: 10px;
                }

                .icon i {
                    font-size: 18px;
                }

                .status {
                    padding: 18px;
                    border-radius: 16px;
                }
            }

            @media (max-width: 480px) {
                h1 {
                    font-size: clamp(1.35rem, 8.5vw, 2.6rem);
                    line-height: 0.98;
                }

                .hero p,
                .card p {
                    font-size: 0.95rem;
                }

                .link-meta {
                    font-size: 0.82rem;
                }

                .card-grid {
                    gap: 14px;
                }

                .link-list {
                    gap: 10px;
                }
            }
        </style>
    </head>
    <body>
        <main class="page-shell">
            <section class="hero">
                <div class="eyebrow">Community Link Hub</div>
                <h1>Monsterpatch Database</h1>
                <p>Everything useful in one place: official updates, social channels, community tools, videos, and other SmashGames projects. Send feedback on <a href="https://github.com/LeigerGaming/monsterpatchdb" target="_blank">GitHub</a> or <a href="https://discord.com/channels/1283131155645857844/1524436413620158464" target="_blank">Discord</a>.</p>
            </section>

            <section id="load-status" class="status">
                <strong>Loading links...</strong>
            </section>
            <section id="card-grid" class="card-grid" hidden></section>
        </main>

        <aside id="featured-video-slot" class="featured-video-slot" hidden></aside>

        <div id="video-modal" class="video-modal" hidden>
            <button type="button" class="video-modal-backdrop" aria-label="Close video"></button>
            <div class="video-modal-panel">
                <button type="button" id="video-modal-close" class="video-modal-close" aria-label="Close video">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
                <div class="video-modal-frame">
                    <iframe id="video-modal-iframe" title="Video player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <script src="./assets/featured-video.js"></script>
        <script>
            const status = document.getElementById("load-status");
            const cardGrid = document.getElementById("card-grid");

            function createLinkItem(link) {
                const anchor = document.createElement("a");
                anchor.className = "link-item";
                anchor.href = link.url;
                anchor.target = "_blank";
                anchor.rel = "noopener noreferrer";

                const icon = document.createElement("span");
                icon.className = "icon";
                icon.setAttribute("aria-hidden", "true");

                const iconGlyph = document.createElement("i");
                iconGlyph.className = `${typeof link.icon === "string" && link.icon.trim() ? link.icon.trim() : "fa-solid fa-link"} fa-fw`;
                icon.appendChild(iconGlyph);

                const copy = document.createElement("span");
                copy.className = "link-copy";

                const title = document.createElement("span");
                title.className = "link-title";
                title.textContent = link.title;

                const meta = document.createElement("span");
                meta.className = "link-meta";
                meta.textContent = link.description;

                copy.append(title, meta);
                anchor.append(icon, copy);
                return anchor;
            }

            function createCard(section) {
                const article = document.createElement("article");
                article.className = "card";

                if (typeof section.title === "string" && section.title.toLowerCase().includes("game")) {
                    article.classList.add("games-card");
                }

                const heading = document.createElement("h2");
                heading.textContent = section.title;

                const description = document.createElement("p");
                description.textContent = section.description;

                const list = document.createElement("div");
                list.className = "link-list";

                section.links.forEach((link) => {
                    list.appendChild(createLinkItem(link));
                });

                article.append(heading, description, list);
                return article;
            }

            async function loadLinks() {
                try {
                    const response = await fetch("./links.json", { cache: "no-store" });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    const sections = Array.isArray(data.sections) ? data.sections : [];
                    const featuredVideo = data.featuredVideo && typeof data.featuredVideo === "object" ? data.featuredVideo : null;

                    if (!sections.length) {
                        throw new Error("No sections found");
                    }

                    const fragment = document.createDocumentFragment();
                    sections.forEach((section) => {
                        fragment.appendChild(createCard(section));
                    });

                    cardGrid.replaceChildren(fragment);
                    cardGrid.hidden = false;
                    renderFeaturedVideo(featuredVideo);
                    status.hidden = true;
                } catch (error) {
                    status.innerHTML = "<strong>Could not load links.</strong> Please let Leigerpatch know in the <a href='https://discord.gg/EmhSRUxP8Z' target='_blank'>Monsterpatch Discord server</a>.";
                    console.error(error);
                }
            }

            loadLinks();
        </script>
    </body>
</html>
