name: Report a problem
description: Report a broken link, missing page, incorrect info, or another issue
title: "[Problem]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the problem
      placeholder: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to reproduce it.
      placeholder: |
        1. Go to...
        2. Click...
        3. See issue...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, relevant URLs, or details that might help.
